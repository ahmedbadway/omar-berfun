<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" role="img" aria-label="VERDE">
  <style>
    :root { --c-bg: #f8f6f3; --c-primary: #0a0a0a; --c-accent: #c9a96e; }
    .bg { fill: var(--c-bg); }
    .frame { fill: none; stroke: var(--c-accent); stroke-width: 2; }
    .name { fill: var(--c-primary); font-family: 'Nunito', sans-serif; font-weight: 800; letter-spacing: 3px; }
    .tag { fill: var(--c-accent); font-family: 'Nunito', sans-serif; font-weight: 600; letter-spacing: 2px; }
  </style>
  <rect width="400" height="400" class="bg"/>
  <rect x="24" y="24" width="352" height="352" rx="14" class="frame"/>
  <text x="200" y="196" text-anchor="middle" font-size="26" class="name">VERDE</text>
  <text x="200" y="232" text-anchor="middle" font-size="13" class="tag">ELO PERFUMES</text>
</svg>
